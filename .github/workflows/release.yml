name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: axga

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            features: ""
            suffix: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            features: "browser"
            suffix: "-browser"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            features: ""
            suffix: "-minimal"
            no_default_features: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --target ${{ matrix.target }} -p axga-cli --features "${{ matrix.features }}"
          elif [ "${{ matrix.no_default_features }}" = "true" ]; then
            cargo build --release --target ${{ matrix.target }} -p axga-cli --no-default-features
          else
            cargo build --release --target ${{ matrix.target }} -p axga-cli
          fi

      - name: Strip
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Generate SHA256
        run: |
          cd target/${{ matrix.target }}/release
          sha256sum ${{ env.BINARY_NAME }} > ${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.suffix }}.sha256

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.suffix }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}${{ matrix.suffix }}
          path: |
            target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.suffix }}.tar.gz
            target/${{ matrix.target }}/release/*.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          VERSION="${{ github.ref_name }}"
          for dir in artifacts/*; do
            for file in "$dir"/*; do
              fname=$(basename "$file")
              # Rename: axga-<target>.tar.gz → axga-v<version>-<target>.tar.gz
              # Rename: axga-<target>.sha256 → axga-v<version>-<target>.tar.gz.sha256
              newname=$(echo "$fname" | sed "s/^axga-/axga-v${VERSION}-/")
              cp "$file" "release/$newname"
            done
          done
          # Also generate combined sha256 for the tar.gz
          for tar in release/*.tar.gz; do
            sha256sum "$tar" | awk '{print $1}' > "${tar}.sha256"
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "axga ${{ github.ref_name }}"
          body: |
            ## axga ${{ github.ref_name }}

            ### Install
            ```sh
            curl -fsSL https://raw.githubusercontent.com/KJ-AIML/axga-harness-agent-rs/main/install.sh | sudo sh
            ```

            ### Assets
            - `axga-v${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz` — Standard build (10 tools)
            - `axga-v${{ github.ref_name }}-x86_64-unknown-linux-musl-browser.tar.gz` — With browser support
            - `axga-v${{ github.ref_name }}-x86_64-unknown-linux-musl-minimal.tar.gz` — Minimal build (no extras)
          files: release/*
          generate_release_notes: true
