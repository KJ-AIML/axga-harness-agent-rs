name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: axga

jobs:
  build:
    name: Build ${{ matrix.target }}${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (musl) ──
          - target: x86_64-unknown-linux-musl
            asset_target: x86_64-linux-musl
            os: ubuntu-latest
            features: ""
            suffix: ""
          - target: x86_64-unknown-linux-musl
            asset_target: x86_64-linux-musl
            os: ubuntu-latest
            features: "browser"
            suffix: "-browser"
          - target: x86_64-unknown-linux-musl
            asset_target: x86_64-linux-musl
            os: ubuntu-latest
            features: ""
            suffix: "-minimal"
            no_default_features: true
          # TODO: fix aarch64-linux cross-compilation (needs aarch64 musl/gnu linker setup)
          # - target: aarch64-unknown-linux-gnu
          #   asset_target: aarch64-linux-gnu
          #   os: ubuntu-latest
          #   features: ""
          #   suffix: ""
          # ── macOS ──
          - target: x86_64-apple-darwin
            asset_target: x86_64-apple-darwin
            os: macos-13
            features: ""
            suffix: ""
          - target: aarch64-apple-darwin
            asset_target: aarch64-apple-darwin
            os: macos-latest
            features: ""
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: contains(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilers (Linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            cargo build --release --target ${{ matrix.target }} -p axga-cli --features "${{ matrix.features }}"
          elif [ "${{ matrix.no_default_features }}" = "true" ]; then
            cargo build --release --target ${{ matrix.target }} -p axga-cli --no-default-features
          else
            cargo build --release --target ${{ matrix.target }} -p axga-cli
          fi

      - name: Strip
        run: strip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Generate SHA256
        run: |
          cd target/${{ matrix.target }}/release
          sha256sum ${{ env.BINARY_NAME }} > ${{ env.BINARY_NAME }}-${{ matrix.asset_target }}${{ matrix.suffix }}.sha256

      - name: Create archive
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ${{ env.BINARY_NAME }}-${{ matrix.asset_target }}${{ matrix.suffix }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}${{ matrix.suffix }}
          path: |
            target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}-${{ matrix.asset_target }}${{ matrix.suffix }}.tar.gz
            target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}-${{ matrix.asset_target }}${{ matrix.suffix }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          VERSION="${{ github.ref_name }}"
          for dir in artifacts/*; do
            for file in "$dir"/*; do
              fname=$(basename "$file")
              # Rename: axga-<asset-target>.tar.gz → axga-v<version>-<asset-target>.tar.gz
              # Rename: axga-<asset-target>.sha256 → axga-v<version>-<asset-target>.sha256
              # The installer prefers x86_64-linux-musl/aarch64-linux-musl and falls back
              # to the Rust target spelling x86_64-unknown-linux-musl if needed.
              newname=$(echo "$fname" | sed "s/^axga-/axga-${VERSION}-/")
              cp "$file" "release/$newname"
            done
          done
          # Generate sha256 for each tar.gz
          for tar in release/*.tar.gz; do
            sha256sum "$tar" | awk '{print $1}' > "${tar}.sha256"
          done
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "axga ${{ github.ref_name }}"
          body: |
            ## axga ${{ github.ref_name }}

            ### Install
            ```sh
            curl -fsSL https://raw.githubusercontent.com/KJ-AIML/axga-harness-agent-rs/main/install.sh | sudo sh
            ```

            ### Assets
            - `axga-${{ github.ref_name }}-x86_64-linux-musl.tar.gz` — Standard build
            - `axga-${{ github.ref_name }}-x86_64-linux-musl-browser.tar.gz` — With browser support
            - `axga-${{ github.ref_name }}-x86_64-linux-musl-minimal.tar.gz` — Minimal build
            - `axga-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz` — macOS Intel
            - `axga-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz` — macOS Apple Silicon
          files: release/*
          generate_release_notes: true
