# .cargo/config.toml
# Build configuration for 1GB VPS deployment (ADR-007).

[target.x86_64-unknown-linux-musl]
# Static linking — no glibc dependency on VPS.
rustflags = ["-C", "target-feature=+crt-static"]

[profile.release]
# Smaller binary: prefer size over speed for VPS deployment.
opt-level = "s"
lto = true
codegen-units = 1
strip = true
panic = "abort"
